version: "3.9"

services:

  # ── Python / FastAPI backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      MODEL_BACKEND: ${MODEL_BACKEND:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b-instruct-q4_K_M}
      # When using Ollama, point to the host machine or a dedicated container
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      VAULT_PATH: /app/vault
      SAVE_INDEX_PATH: /app/vector_db
      PORT: 8000
      PYTHONPATH: /app
    volumes:
      # Mount your Obsidian vault as read-only
      - /home/matafix/obsidian_knowlage/md_store:/app/vault:ro
      # FAISS
      - /home/matafix/obsidian_knowlage/faiss:/app/vector_db
    expose:
      - "8000"          # internal only — frontend nginx proxies to it
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-net

  # ── Nginx + static frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8005}:80"   # exposed to the host
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
