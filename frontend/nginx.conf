server {
    listen 80;
    server_name _;

    # ── Static frontend ────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA for any path that doesn't match an API route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend REST proxies ───────────────────────────────────────────────

    # /flashcard/batch and legacy /flashcard — prefix match covers both
    location /flashcard {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;   # flashcard generation can take a few seconds
    }

    location /health {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }

    location /info {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }

    # ── WebSocket proxies ──────────────────────────────────────────────────

    # MCP chat — model calls Obsidian tools
    location /ws {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # RAG chat — FAISS semantic search
    location /ask {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
