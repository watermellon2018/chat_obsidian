<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian MCP Chat</title>

<!-- DaisyUI 4 -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">

<!-- Tailwind CDN — configure before loading -->
<script>
  tailwind = {
    config: {
      theme: {
        extend: {
          colors: {
            'ctp-base':    '#1e1e2e',
            'ctp-mantle':  '#181825',
            'ctp-surface': '#313244',
            'ctp-overlay': '#45475a',
            'ctp-muted':   '#7f849c',
            'ctp-text':    '#cdd6f4',
            'ctp-blue':    '#89b4fa',
            'ctp-sky':     '#74c7ec',
            'ctp-mauve':   '#cba6f7',
            'ctp-green':   '#a6e3a1',
            'ctp-red':     '#f38ba8',
            'ctp-yellow':  '#f9e2af',
          },
        },
      },
    },
  };
</script>
<script src="https://cdn.tailwindcss.com"></script>

<!-- marked for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Catppuccin Mocha DaisyUI theme -->
<style>
  [data-theme="mocha"] {
    --color-base-100: #1e1e2e;
    --color-base-200: #181825;
    --color-base-300: #313244;
    --color-base-content: #cdd6f4;
    --color-primary: #89b4fa;
    --color-primary-content: #1e1e2e;
    --color-secondary: #74c7ec;
    --color-secondary-content: #1e1e2e;
    --color-accent: #cba6f7;
    --color-accent-content: #1e1e2e;
    --color-neutral: #45475a;
    --color-neutral-content: #cdd6f4;
    --color-info: #74c7ec;
    --color-success: #a6e3a1;
    --color-warning: #f9e2af;
    --color-error: #f38ba8;
  }

  /* Markdown prose inside chat bubbles */
  .chat-bubble h1, .chat-bubble h2, .chat-bubble h3 {
    margin: .5em 0 .25em; color: #89b4fa; font-weight: 600;
  }
  .chat-bubble p    { margin: .25em 0; }
  .chat-bubble ul, .chat-bubble ol { padding-left: 1.4em; margin: .25em 0; }
  .chat-bubble code {
    background: rgba(255,255,255,.08); padding: 1px 5px;
    border-radius: 4px; font-size: .85em; font-family: monospace;
  }
  .chat-bubble pre {
    background: rgba(255,255,255,.05); border: 1px solid #45475a;
    border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin: .4em 0;
  }
  .chat-bubble pre code { background: none; padding: 0; }
  .chat-bubble strong  { color: #89b4fa; }
  .chat-bubble blockquote {
    border-left: 3px solid #89b4fa; padding-left: 10px;
    color: #7f849c; margin: .25em 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-enter { animation: fadeIn .2s ease; }
</style>

<!-- Alpine ESM entry point — must be type="module" -->
<script type="module" src="js/app.js"></script>
</head>

<body data-theme="mocha" x-data="appShell" class="bg-base-100 text-base-content h-dvh flex flex-col overflow-hidden">

<!-- ═══════════════════════════════════════════════════════════════
     HEADER
════════════════════════════════════════════════════════════════ -->
<header class="shrink-0 flex flex-wrap items-center gap-2 px-5 py-3 bg-base-200 border-b border-base-300">

  <!-- Connection dot -->
  <div class="w-2 h-2 rounded-full shrink-0 transition-colors"
       :class="$store.app.wsConnected ? 'bg-success' : 'bg-neutral'"></div>

  <!-- Title -->
  <h1 class="text-sm font-semibold text-primary" x-text="_t('title')"></h1>
  <span class="text-xs text-base-content/50" x-text="_t('subtitle')"></span>

  <!-- Right controls -->
  <div class="ml-auto flex items-center gap-2 flex-wrap">

    <!-- Language toggle -->
    <div class="join">
      <button class="join-item btn btn-xs"
              :class="$store.app.lang === 'en' ? 'btn-primary' : 'btn-ghost'"
              @click="$store.app.setLang('en')">EN</button>
      <button class="join-item btn btn-xs"
              :class="$store.app.lang === 'ru' ? 'btn-primary' : 'btn-ghost'"
              @click="$store.app.setLang('ru')">RU</button>
    </div>

    <!-- MCP / RAG toggle (chat mode only) -->
    <div class="join" x-show="$store.app.mode === 'chat'">
      <button class="join-item btn btn-xs"
              :class="$store.app.chatMode === 'mcp' ? 'btn-secondary' : 'btn-ghost'"
              @click="$store.app.setChatMode('mcp')">MCP</button>
      <button class="join-item btn btn-xs"
              :class="$store.app.chatMode === 'rag' ? 'btn-secondary' : 'btn-ghost'"
              @click="$store.app.setChatMode('rag')">RAG</button>
    </div>

    <!-- Chat / Flashcards mode toggle -->
    <div class="join">
      <button class="join-item btn btn-xs"
              :class="$store.app.mode === 'chat' ? 'btn-accent' : 'btn-ghost'"
              @click="$store.app.setMode('chat')"
              x-text="_t('modeChat')"></button>
      <button class="join-item btn btn-xs"
              :class="$store.app.mode === 'flashcards' ? 'btn-accent' : 'btn-ghost'"
              @click="$store.app.setMode('flashcards')"
              x-text="_t('modeFlash')"></button>
    </div>

  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════════
     CHAT PANEL
     x-show (not x-if) keeps the component alive during mode switches
     so the WebSocket stays connected.
════════════════════════════════════════════════════════════════ -->
<div x-data="chat"
     x-show="$store.app.mode === 'chat'"
     class="flex flex-col flex-1 min-h-0">

  <!-- Message list -->
  <div x-ref="messageList"
       class="flex-1 overflow-y-auto flex flex-col gap-3 px-4 py-5 scroll-smooth">

    <!-- Finalized messages -->
    <template x-for="msg in messages" :key="msg.id">
      <div class="msg-enter"
           :class="msg.role === 'user' ? 'chat chat-end' : 'chat chat-start'">

        <!-- User bubble -->
        <template x-if="msg.role === 'user'">
          <div class="chat-bubble bg-base-300 text-base-content max-w-[78%]"
               x-text="msg.content"></div>
        </template>

        <!-- Bot bubble (Markdown) -->
        <template x-if="msg.role === 'bot'">
          <div>
            <div class="chat-bubble bg-base-200 border border-base-300 text-base-content max-w-[78%]"
                 x-html="renderMarkdown(msg.content)"></div>
            <!-- Source badges -->
            <template x-if="msg.sources && msg.sources.length">
              <div class="flex flex-wrap gap-1.5 mt-1.5 pl-1">
                <template x-for="src in msg.sources" :key="src">
                  <a :href="obsidianHref(src)"
                     class="badge badge-success badge-outline text-xs cursor-pointer hover:opacity-80"
                     title="Open in Obsidian">
                    📄 <span x-text="src"></span>
                  </a>
                </template>
              </div>
            </template>
          </div>
        </template>

        <!-- Error bubble -->
        <template x-if="msg.role === 'error'">
          <div class="alert alert-error max-w-[78%] py-2 px-3 text-sm">
            ⚠ <span x-text="msg.content"></span>
          </div>
        </template>

      </div>
    </template>

    <!-- In-flight: tool chips + thinking indicator -->
    <template x-if="pendingMsg">
      <div class="chat chat-start">
        <div class="flex flex-col gap-1">

          <!-- Tool chips -->
          <template x-for="(tc, i) in pendingMsg.tools" :key="i">
            <div class="badge badge-outline text-info border-info gap-1.5 msg-enter"
                 :class="tc.done ? '' : 'opacity-90'">
              <span x-show="!tc.done" class="loading loading-spinner loading-xs"></span>
              <span x-show="tc.done"  class="text-success text-xs">✓</span>
              <span x-text="formatTool(tc.name, tc.args)"></span>
            </div>
          </template>

          <!-- Thinking dots (shown until first tool_start or done) -->
          <div x-show="pendingMsg.showThinking"
               class="chat-bubble bg-base-200 border border-base-300 px-4 py-3">
            <span class="loading loading-dots loading-sm text-base-content/60"></span>
          </div>

        </div>
      </div>
    </template>

  </div><!-- /message list -->

  <!-- Input row -->
  <div class="shrink-0 flex gap-2 items-end px-4 py-3 bg-base-200 border-t border-base-300">
    <textarea
      x-model="inputText"
      @keydown.enter="handleEnter($event)"
      @input="$event.target.style.height='auto'; $event.target.style.height=Math.min($event.target.scrollHeight,140)+'px'"
      :placeholder="_t('placeholder')"
      :disabled="busy"
      rows="1"
      class="textarea textarea-bordered flex-1 resize-none min-h-[40px] max-h-[140px] bg-base-100 text-base-content text-sm leading-relaxed"
    ></textarea>
    <button @click="send()"
            :disabled="busy || !$store.app.wsConnected"
            class="btn btn-primary shrink-0 h-10 min-h-0"
            x-text="_t('sendBtn')"></button>
  </div>

</div><!-- /chat panel -->

<!-- ═══════════════════════════════════════════════════════════════
     FLASHCARDS PANEL
════════════════════════════════════════════════════════════════ -->
<div x-data="flashcards"
     x-show="$store.app.mode === 'flashcards'"
     @keydown.window="handleKey($event)"
     class="flex flex-col flex-1 min-h-0 items-center justify-center gap-4 px-4 py-5">

  <!-- Loading skeleton -->
  <template x-if="loading">
    <div class="flex flex-col items-center gap-3 w-full max-w-lg">
      <div class="skeleton h-6 w-48 rounded-full"></div>
      <div class="skeleton h-64 w-full rounded-xl"></div>
      <div class="skeleton h-8 w-32 rounded-lg"></div>
    </div>
  </template>

  <!-- Error state -->
  <template x-if="error && !loading">
    <div class="alert alert-error max-w-lg">
      ⚠ <span x-text="error"></span>
      <button class="btn btn-sm btn-ghost ml-auto" @click="fetchBatch()" x-text="_t('fcNext')"></button>
    </div>
  </template>

  <!-- Card + controls -->
  <template x-if="currentCard && !loading">
    <div class="flex flex-col items-center gap-4 w-full">

      <!-- Topic badge + progress -->
      <div class="flex flex-col items-center gap-1">
        <div class="badge badge-outline border-info text-info text-xs px-3 py-2 max-w-[90vw] truncate"
             x-text="topicLabel"></div>
        <div class="text-xs text-base-content/50" x-text="progress"></div>
      </div>

      <!-- 3D flip card -->
      <div class="[perspective:1000px] w-[620px] max-w-[90vw] h-64 cursor-pointer"
           @click="flipCard()">
        <div class="relative w-full h-full [transform-style:preserve-3d] transition-transform duration-[450ms]"
             :class="cardFlipped ? '[transform:rotateY(180deg)]' : ''">

          <!-- Front face -->
          <div class="absolute inset-0 [backface-visibility:hidden] rounded-xl
                      bg-base-200 border border-base-300
                      flex flex-col items-center justify-center gap-3 p-7 text-center">
            <span class="text-[10px] uppercase tracking-widest text-base-content/40"
                  x-text="_t('fcLabel')"></span>
            <p class="text-base leading-relaxed text-base-content"
               x-text="currentCard.question"></p>
          </div>

          <!-- Back face -->
          <div class="absolute inset-0 [backface-visibility:hidden] [transform:rotateY(180deg)] rounded-xl
                      bg-base-300 border border-info/40
                      flex flex-col items-center justify-center gap-3 p-7 text-center">
            <p class="text-base leading-relaxed text-base-content"
               x-text="currentCard.answer"></p>
            <template x-if="currentCard.source">
              <a :href="obsidianHref(currentCard.source)"
                 class="badge badge-success badge-outline text-xs hover:opacity-80"
                 @click.stop
                 title="Open in Obsidian">
                📄 <span x-text="currentCard.source"></span>
              </a>
            </template>
          </div>

        </div>
      </div><!-- /flip card -->

      <!-- Navigation buttons -->
      <div class="flex flex-col items-center gap-2">
        <div class="flex gap-2">
          <button class="btn btn-ghost btn-sm"
                  :disabled="isPrevDisabled"
                  @click="prevCard()"
                  x-text="_t('fcPrev')"></button>
          <button class="btn btn-primary btn-sm"
                  :disabled="isNextDisabled"
                  @click="nextCard()"
                  x-text="_t('fcNext')"></button>
        </div>
        <p class="text-xs text-base-content/40" x-text="_t('fcHint')"></p>
      </div>

    </div>
  </template>

  <!-- Empty state: panel visible but no card yet and no error -->
  <template x-if="!currentCard && !loading && !error">
    <button class="btn btn-primary" @click="fetchBatch()" x-text="_t('fcNext')"></button>
  </template>

</div><!-- /flashcards panel -->

</body>
</html>
